<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Espeon</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }

        .card-container {
            position: relative;
            width: 90vw;
            max-width: 450px;
            aspect-ratio: 686 / 956;
            /* NOMBRE CORREGIDO AQUÍ ABAJO */
            background-image: url('espeon_card.jpg.png'); 
            background-size: cover;
            background-position: center;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .cotizador-overlay {
            position: absolute;
            top: 55%; /* Ajustado para que caiga justo en la zona rosada */
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 18px;
            font-weight: 900;
            color: #2c2c2c;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-bubble {
            background: white;
            border-radius: 15px;
            padding: 12px 20px;
            width: 100%;
            box-sizing: border-box;
            box-shadow: 4px 4px 10px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            border: 2px solid #ddd;
        }

        .input-bubble span {
            font-size: 24px;
            color: #777;
            margin-right: 10px;
        }

        .input-bubble input {
            border: none;
            width: 100%;
            font-size: 24px;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            outline: none;
        }

        .result-display {
            font-size: 38px;
            font-weight: 900;
            color: #1a1a1a;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="cotizador-overlay">
            
            <div class="label">Ingrese monto USD</div>
            <div class="input-bubble">
                <span>$</span>
                <input type="number" id="usdInput" placeholder="0.00">
            </div>

            <div class="label">Resultado en ARS</div>
            <div class="result-display" id="arsResult">$ 0,00</div>

        </div>
    </div>

    <script>
        const usdInput = document.getElementById('usdInput');
        const arsResult = document.getElementById('arsResult');

        usdInput.addEventListener('input', () => {
            const usd = parseFloat(usdInput.value);
            
            if (isNaN(usd) || usd <= 0) {
                arsResult.innerText = "$ 0,00";
                return;
            }

            // Lógica: (Monto + 2) * 1400
            const calculo = (usd + 2) * 1400;

            arsResult.innerText = new Intl.NumberFormat('es-AR', {
                style: 'currency',
                currency: 'ARS',
                minimumFractionDigits: 2
            }).format(calculo);
        });
    </script>

</body>
</html>
