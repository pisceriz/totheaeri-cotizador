<style>
    /* Estilos generales de la página */
    body {
        /* COLOR DE FONDO PLATEADO SATINADO */
        background-color: #c0c0c0; /* Un gris plateado metálico */
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: 'Exo 2', sans-serif;
        
        /* POSICIÓN PARA EL EFECTO DE ESTRELLAS */
        position: relative;
        overflow: hidden; /* Evita que las estrellas sobresalgan de la pantalla */
    }

    /* EFECTO DE ESTRELLAS DIMINUTAS CON CSS */
    body::after {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: transparent;
        z-index: -1; /* Coloca las estrellas detrás del cotizador */
        
        /* Patrón de estrellas usando sombras de caja múltiples */
        background-image: 
          radial-gradient(1px 1px at 20px 30px, #eee, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 150px 150px, #ddd, rgba(0,0,0,0)),
          radial-gradient(1.5px 1.5px at 250px 50px, #fff, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 300px 300px, #eee, rgba(0,0,0,0)),
          radial-gradient(1.5px 1.5px at 400px 100px, #fff, rgba(0,0,0,0)),
          radial-gradient(1px 1px at 500px 400px, #eee, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 600px 200px, #fff, rgba(0,0,0,0)),
          radial-gradient(1.5px 1.5px at 700px 350px, #ddd, rgba(0,0,0,0));
        background-repeat: repeat;
        background-size: 500px 500px;
        opacity: 0.8;
        
        /* Animación de parpadeo */
        animation: twinkle 5s linear infinite;
    }

    /* Animación para el parpadeo de las estrellas */
    @keyframes twinkle {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 0.5; }
    }

    /* Estilos del contenedor de la carta (se mantiene igual) */
    .card-container {
        position: relative;
        width: 380px;
        aspect-ratio: 686 / 956;
        background-image: url('card.png'); /* Reemplaza por tu imagen de carta de Espeon */
        background-size: cover;
        background-position: center;
        border-radius: 20px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        overflow: hidden;
    }

    /* Estilos del widget del cotizador superpuesto (se mantiene igual) */
    .cotizador-overlay {
        position: absolute;
        top: 55%; 
        left: 50%;
        transform: translateX(-50%);
        width: 80%;
        display: flex;
        flex-direction: column;
    }

    .label {
        font-size: 16px;
        font-weight: 900;
        color: #2c2c2c;
        margin-bottom: 5px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .input-bubble {
        background: rgba(255, 255, 255, 0.9);
        border-radius: 12px;
        padding: 10px 15px;
        width: 100%;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        margin-bottom: 20px;
        border: 2px solid rgba(0,0,0,0.1);
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .input-bubble span {
        font-size: 22px;
        color: #555;
        margin-right: 8px;
    }

    .input-bubble input {
        border: none;
        background: transparent;
        width: 100%;
        font-size: 22px;
        font-family: 'Exo 2', sans-serif;
        font-weight: 700;
        outline: none;
        color: #000;
    }

    .result-display {
        font-size: 34px;
        font-weight: 900;
        color: #111;
        text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
    }

    /* Ocultar flechitas del input de número */
    input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
        -webkit-appearance: none; margin: 0;
    }
</style>
