<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Espeon</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #222; /* Fondo oscuro para que resalte la carta */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }

        .card-container {
            position: relative;
            width: 380px; /* Tamaño más fiel a una carta real */
            aspect-ratio: 686 / 956;
            background-image: url('card.png'); /* EL NOMBRE NUEVO */
            background-size: cover;
            background-position: center;
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        .cotizador-overlay {
            position: absolute;
            top: 55%; /* Ubicado sobre la zona rosada de tu imagen */
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            display: flex;
            flex-direction: column;
        }

        .label {
            font-size: 16px;
            font-weight: 900;
            color: #333; /* Texto oscuro para que se lea sobre el rosa */
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-bubble {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 12px;
            padding: 10px 15px;
            width: 100%;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            border: 2px solid rgba(0,0,0,0.1);
        }

        .input-bubble span {
            font-size: 22px;
            color: #555;
            margin-right: 8px;
        }

        .input-bubble input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 22px;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            outline: none;
            color: #000;
        }

        .result-display {
            font-size: 34px;
            font-weight: 900;
            color: #111;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
        }

        /* Ocultar flechitas del input */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="cotizador-overlay">
            
            <div class="label">Ingrese monto USD</div>
            <div class="input-bubble">
                <span>$</span>
                <input type="number" id="usdInput" placeholder="0.00">
            </div>

            <div class="label">Resultado en ARS</div>
            <div class="result-display" id="arsResult">$ 0,00</div>

        </div>
    </div>

    <script>
        const usdInput = document.getElementById('usdInput');
        const arsResult = document.getElementById('arsResult');

        usdInput.addEventListener('input', () => {
            const usd = parseFloat(usdInput.value);
            if (isNaN(usd) || usd <= 0) {
                arsResult.innerText = "$ 0,00";
                return;
            }
            // Tu fórmula: (Monto + 2) * 1400
            const calculo = (usd + 2) * 1380;
            arsResult.innerText = new Intl.NumberFormat('es-AR', {
                style: 'currency',
                currency: 'ARS',
                minimumFractionDigits: 2
            }).format(calculo);
        });
    </script>
</body>
</html>
