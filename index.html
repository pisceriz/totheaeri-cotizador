<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador Espeon Shiny</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@700;900&display=swap" rel="stylesheet">
    <style>
        body {
            /* FONDO OSCURO PARA QUE SE VEAN LAS ESTRELLAS */
            background-color: #0b0e14; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Exo 2', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* CAPA DE ESTRELLAS ANIMADAS */
        .stars-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.5); opacity: 1; }
        }

        /* CONTENEDOR DE LA CARTA */
        .card-container {
            position: relative;
            width: 380px;
            aspect-ratio: 686 / 956;
            background-image: url('card.png'); /* ASEGURATE QUE TU IMAGEN SE LLAME card.png */
            background-size: cover;
            background-position: center;
            border-radius: 18px;
            box-shadow: 0 0 30px rgba(192, 160, 255, 0.3); /* Brillo lila suave */
            z-index: 10;
        }

        /* EL COTIZADOR (ZONA ROSADA) */
        .cotizador-overlay {
            position: absolute;
            top: 55%; 
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            text-align: left;
        }

        .label {
            font-size: 16px;
            font-weight: 900;
            color: #333;
            margin-bottom: 8px;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5);
        }

        .input-bubble {
            background: white;
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        .input-bubble span { font-size: 22px; color: #888; margin-right: 10px; }
        .input-bubble input {
            border: none;
            width: 100%;
            font-size: 22px;
            font-weight: 700;
            outline: none;
            font-family: 'Exo 2', sans-serif;
        }

        .result-display {
            font-size: 38px;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: -1px;
        }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body>

    <div class="stars-container" id="starField"></div>

    <div class="card-container">
        <div class="cotizador-overlay">
            <div class="label">Ingrese monto USD</div>
            <div class="input-bubble">
                <span>$</span>
                <input type="number" id="usdInput" placeholder="0.00">
            </div>

            <div class="label">Resultado en ARS</div>
            <div class="result-display" id="arsResult">$ 0,00</div>
        </div>
    </div>

    <script>
        // Crear estrellas aleatorias
        const starField = document.getElementById('starField');
        const starCount = 100;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            starField.appendChild(star);
        }

        // Lógica del cotizador
        const usdInput = document.getElementById('usdInput');
        const arsResult = document.getElementById('arsResult');

        usdInput.addEventListener('input', () => {
            const usd = parseFloat(usdInput.value);
            if (isNaN(usd) || usd <= 0) {
                arsResult.innerText = "$ 0,00";
                return;
            }
            const calculo = (usd + 2) * 1400;
            arsResult.innerText = new Intl.NumberFormat('es-AR', {
                style: 'currency',
                currency: 'ARS',
                minimumFractionDigits: 2
            }).format(calculo);
        });
    </script>
</body>
</html>
